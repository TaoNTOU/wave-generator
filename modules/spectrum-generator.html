<!-- ===================================================== -->
<!-- 不規則波參數控制 + 頻譜理論互動模組 -->
<!-- 完整版 -->
<!-- ===================================================== -->

<div class="control">

  <label for="spectrumType">
    Spectrum Method
  </label>

  <select id="spectrumType">

    <option value="pm">
      Pierson-Moskowitz
    </option>

    <option value="jonswap">
      JONSWAP
    </option>

    <option value="bretschneider">
      Bretschneider
    </option>

    <option value="tma">
      TMA
    </option>

  </select>

</div>

<!-- ===================================================== -->
<!-- PM Parameters -->
<!-- ===================================================== -->

<div id="pmControls"
     class="spectrum-control-panel">

  <div class="control">

    <label>
      α (Phillips constant)
    </label>

    <input id="pmAlpha"
           type="number"
           step="0.0001"
           value="0.0081">

  </div>

  <div class="control">

    <label>
      β (Decay coefficient)
    </label>

    <input id="pmBeta"
           type="number"
           step="0.01"
           value="1.25">

  </div>

</div>

<!-- ===================================================== -->
<!-- JONSWAP Parameters -->
<!-- ===================================================== -->

<div id="jonswapControls"
     class="spectrum-control-panel"
     style="display:none;">

  <div class="control">

    <label>
      γ (Peak enhancement)
    </label>

    <input id="jonswapGamma"
           type="number"
           step="0.1"
           value="3.3">

  </div>

  <div class="control">

    <label>
      σa
    </label>

    <input id="jonswapSigmaA"
           type="number"
           step="0.01"
           value="0.07">

  </div>

  <div class="control">

    <label>
      σb
    </label>

    <input id="jonswapSigmaB"
           type="number"
           step="0.01"
           value="0.09">

  </div>

  <div class="control">

    <label>
      α
    </label>

    <input id="jonswapAlpha"
           type="number"
           step="0.0001"
           value="0.0081">

  </div>

</div>

<!-- ===================================================== -->
<!-- Bretschneider Parameters -->
<!-- ===================================================== -->

<div id="bretschneiderControls"
     class="spectrum-control-panel"
     style="display:none;">

  <div class="control">

    <label>
      Hs (m)
    </label>

    <input id="bretschneiderHs"
           type="number"
           step="0.1"
           value="2.0">

  </div>

  <div class="control">

    <label>
      Tp (s)
    </label>

    <input id="bretschneiderTp"
           type="number"
           step="0.1"
           value="8.0">

  </div>

</div>

<!-- ===================================================== -->
<!-- TMA Parameters -->
<!-- ===================================================== -->

<div id="tmaControls"
     class="spectrum-control-panel"
     style="display:none;">

  <div class="control">

    <label>
      γ
    </label>

    <input id="tmaGamma"
           type="number"
           step="0.1"
           value="3.3">

  </div>

  <div class="control">

    <label>
      Depth correction
    </label>

    <input id="tmaDepthFactor"
           type="number"
           step="0.01"
           value="1.0">

  </div>

  <div class="control">

    <label>
      Shallow coefficient
    </label>

    <input id="tmaShallowCoeff"
           type="number"
           step="0.01"
           value="1.0">

  </div>

</div>

<!-- ===================================================== -->
<!-- 頻譜理論說明 -->
<!-- ===================================================== -->

<div id="spectrumInfoBox"
     class="spectrum-info-box">

  <div id="pmInfo"
       class="spectrum-info-panel">

    <h3>
      Pierson-Moskowitz Spectrum
    </h3>

<pre>
S(f)=αg²(2π)^-4 f^-5 exp[-β(fp/f)^4]
</pre>

  </div>

  <div id="jonswapInfo"
       class="spectrum-info-panel"
       style="display:none;">

    <h3>
      JONSWAP Spectrum
    </h3>

<pre>
S(f)=PM(f)·γ^exp[-(f-fp)^2/(2σ^2fp^2)]
</pre>

  </div>

  <div id="bretschneiderInfo"
       class="spectrum-info-panel"
       style="display:none;">

    <h3>
      Bretschneider Spectrum
    </h3>

<pre>
S(f)=5/16 Hs² fp⁴ f^-5 exp[-5/4(fp/f)^4]
</pre>

  </div>

  <div id="tmaInfo"
       class="spectrum-info-panel"
       style="display:none;">

    <h3>
      TMA Spectrum
    </h3>

<pre>
S_TMA(f)=S_JONSWAP(f)·Φ(ω,h)
</pre>

  </div>

</div>

<style>

/* ===================================================== */
/* Spectrum Panel */
/* ===================================================== */

.spectrum-control-panel {

  margin-top: 12px;

  padding: 12px;

  border: 1px solid #d8e0ea;

  border-radius: 8px;

  background: #fbfcfd;

}

.spectrum-info-box {

  margin-top: 16px;

  padding: 14px;

  border: 1px solid #d8e0ea;

  border-radius: 8px;

  background: #fbfcfd;

}

.spectrum-info-box pre {

  padding: 12px;

  border-radius: 6px;

  background: #eef4f8;

  overflow-x: auto;

}

</style>

<script>

// =====================================================
// Spectrum UI Update
// =====================================================

function updateSpectrumUI() {

  const type =
    document.getElementById("spectrumType").value;

  // ===================================================
  // hide all control panels
  // ===================================================

  document
    .querySelectorAll(".spectrum-control-panel")
    .forEach(panel => {

      panel.style.display = "none";

    });

  // ===================================================
  // hide all info panels
  // ===================================================

  document
    .querySelectorAll(".spectrum-info-panel")
    .forEach(panel => {

      panel.style.display = "none";

    });

  // ===================================================
  // PM
  // ===================================================

  if (type === "pm") {

    document
      .getElementById("pmControls")
      .style.display = "block";

    document
      .getElementById("pmInfo")
      .style.display = "block";

  }

  // ===================================================
  // JONSWAP
  // ===================================================

  if (type === "jonswap") {

    document
      .getElementById("jonswapControls")
      .style.display = "block";

    document
      .getElementById("jonswapInfo")
      .style.display = "block";

  }

  // ===================================================
  // Bretschneider
  // ===================================================

  if (type === "bretschneider") {

    document
      .getElementById("bretschneiderControls")
      .style.display = "block";

    document
      .getElementById("bretschneiderInfo")
      .style.display = "block";

  }

  // ===================================================
  // TMA
  // ===================================================

  if (type === "tma") {

    document
      .getElementById("tmaControls")
      .style.display = "block";

    document
      .getElementById("tmaInfo")
      .style.display = "block";

  }

}

// =====================================================
// Spectrum Type Change Event
// =====================================================

document
  .getElementById("spectrumType")
  .addEventListener(
    "change",
    updateSpectrumUI
  );

// =====================================================
// Initial Update
// =====================================================

updateSpectrumUI();

  // =====================================================
// Spectrum Shape Function
// 真正頻譜計算核心
// =====================================================

function spectrumShape(
  type,
  f,
  fp,
  depth
) {

  if (f <= 0) {
    return 0;
  }

  // ===================================================
  // PM Parameters
  // ===================================================

  const pmAlpha =
    Number(
      document.getElementById("pmAlpha").value
    ) || 0.0081;

  const pmBeta =
    Number(
      document.getElementById("pmBeta").value
    ) || 1.25;

  // ===================================================
  // JONSWAP Parameters
  // ===================================================

  const gamma =
    Number(
      document.getElementById("jonswapGamma").value
    ) || 3.3;

  const sigmaA =
    Number(
      document.getElementById("jonswapSigmaA").value
    ) || 0.07;

  const sigmaB =
    Number(
      document.getElementById("jonswapSigmaB").value
    ) || 0.09;

  const jonswapAlpha =
    Number(
      document.getElementById("jonswapAlpha").value
    ) || 0.0081;

  // ===================================================
  // Bretschneider Parameters
  // ===================================================

  const Hs =
    Number(
      document.getElementById("bretschneiderHs").value
    ) || 2.0;

  const Tp =
    Number(
      document.getElementById("bretschneiderTp").value
    ) || 8.0;

  // ===================================================
  // TMA Parameters
  // ===================================================

  const tmaGamma =
    Number(
      document.getElementById("tmaGamma").value
    ) || 3.3;

  const tmaDepthFactor =
    Number(
      document.getElementById("tmaDepthFactor").value
    ) || 1.0;

  const tmaShallowCoeff =
    Number(
      document.getElementById("tmaShallowCoeff").value
    ) || 1.0;

  // ===================================================
  // PM Spectrum
  // ===================================================

  if (type === "pm") {

    return (
      pmAlpha *
      g * g *
      Math.pow(2 * Math.PI, -4) *
      Math.pow(f, -5) *
      Math.exp(
        -pmBeta *
        Math.pow(fp / f, 4)
      )
    );

  }

  // ===================================================
  // JONSWAP Spectrum
  // ===================================================

  if (type === "jonswap") {

    const sigma =
      f <= fp
        ? sigmaA
        : sigmaB;

    const pm =
      jonswapAlpha *
      g * g *
      Math.pow(2 * Math.PI, -4) *
      Math.pow(f, -5) *
      Math.exp(
        -1.25 *
        Math.pow(fp / f, 4)
      );

    const enhancement =
      Math.pow(
        gamma,
        Math.exp(
          -Math.pow(f - fp, 2) /
          (
            2 *
            sigma *
            sigma *
            fp *
            fp
          )
        )
      );

    return pm * enhancement;

  }

  // ===================================================
  // Bretschneider Spectrum
  // ===================================================

  if (type === "bretschneider") {

    return (
      (5 / 16) *
      Hs *
      Hs *
      Math.pow(fp, 4) *
      Math.pow(f, -5) *
      Math.exp(
        -1.25 *
        Math.pow(fp / f, 4)
      )
    );

  }

  // ===================================================
  // TMA Spectrum
  // ===================================================

  if (type === "tma") {

    const sigma =
      f <= fp
        ? sigmaA
        : sigmaB;

    const pm =
      jonswapAlpha *
      g * g *
      Math.pow(2 * Math.PI, -4) *
      Math.pow(f, -5) *
      Math.exp(
        -1.25 *
        Math.pow(fp / f, 4)
      );

    const enhancement =
      Math.pow(
        tmaGamma,
        Math.exp(
          -Math.pow(f - fp, 2) /
          (
            2 *
            sigma *
            sigma *
            fp *
            fp
          )
        )
      );

    // ===============================================
    // shallow water correction
    // ===============================================

    const omega =
      2 * Math.PI * f;

    const k =
      solveWaveNumber(
        1 / f,
        depth
      );

    const kh =
      k * depth;

    let phi =
      Math.pow(
        Math.tanh(kh),
        2
      );

    phi *=
      tmaDepthFactor;

    phi *=
      tmaShallowCoeff;

    return (
      pm *
      enhancement *
      phi
    );

  }

  // ===================================================
  // fallback
  // ===================================================

  return 0;

}

</script>
